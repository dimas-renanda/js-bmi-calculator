<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><title>BMI Calculator</title>
<style>
  body{margin:0;background:#0f172a;color:#f1f5f9;font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{background:#1e293b;border-radius:16px;padding:2.5rem;max-width:400px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  h1{margin:0 0 1.5rem;text-align:center;font-size:1.5rem}
  label{display:block;margin-bottom:.25rem;opacity:.7;font-size:.9rem}
  input{width:100%;background:#0f172a;color:#f1f5f9;border:1px solid #334155;border-radius:8px;padding:.75rem;font-size:1rem;box-sizing:border-box;margin-bottom:1rem}
  .toggle{display:flex;gap:.5rem;margin-bottom:1.5rem}
  .toggle button{flex:1;padding:.5rem;border:1px solid #334155;background:transparent;color:#94a3b8;border-radius:8px;cursor:pointer}
  .toggle button.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
  button.calc{width:100%;background:#3b82f6;color:#fff;border:none;padding:.85rem;border-radius:8px;font-size:1rem;cursor:pointer;font-weight:600}
  #result{margin-top:1.5rem;text-align:center;display:none}
  #bmi-val{font-size:3.5rem;font-weight:700;margin:0}
  #bmi-cat{font-size:1.1rem;margin:.25rem 0 1rem;opacity:.8}
  .bar{height:12px;border-radius:6px;background:linear-gradient(to right,#3b82f6,#22c55e,#eab308,#ef4444);position:relative;margin:.5rem 0}
  #marker{position:absolute;top:-4px;width:20px;height:20px;background:#fff;border-radius:50%;transform:translateX(-50%);transition:left .4s;border:3px solid #1e293b}
</style>
</head>
<body>
<div class="card">
  <h1>⚖️ BMI Calculator</h1>
  <div class="toggle">
    <button class="active" id="btn-metric" onclick="setUnit('metric')">Metric (kg/cm)</button>
    <button id="btn-imperial" onclick="setUnit('imperial')">Imperial (lb/in)</button>
  </div>
  <label id="wlabel">Weight (kg)</label>
  <input type="number" id="weight" placeholder="70" min="1">
  <label id="hlabel">Height (cm)</label>
  <input type="number" id="height" placeholder="170" min="1">
  <button class="calc" onclick="calc()">Calculate BMI</button>
  <div id="result">
    <p id="bmi-val">—</p>
    <p id="bmi-cat">—</p>
    <div class="bar"><div id="marker"></div></div>
    <small style="opacity:.4">Underweight · Normal · Overweight · Obese</small>
  </div>
</div>
<script>
let unit='metric';
function setUnit(u){unit=u;document.getElementById('btn-metric').classList.toggle('active',u==='metric');document.getElementById('btn-imperial').classList.toggle('active',u==='imperial');document.getElementById('wlabel').textContent=u==='metric'?'Weight (kg)':'Weight (lb)';document.getElementById('hlabel').textContent=u==='metric'?'Height (cm)':'Height (in)'}
function calc(){
  let w=parseFloat(document.getElementById('weight').value),h=parseFloat(document.getElementById('height').value);
  if(!w||!h)return;
  let bmi;
  if(unit==='metric'){bmi=w/((h/100)**2)}else{bmi=(703*w)/(h**2)}
  bmi=Math.round(bmi*10)/10;
  const cat=bmi<18.5?'Underweight':bmi<25?'Normal weight':bmi<30?'Overweight':'Obese';
  const color=bmi<18.5?'#3b82f6':bmi<25?'#22c55e':bmi<30?'#eab308':'#ef4444';
  document.getElementById('bmi-val').textContent=bmi;
  document.getElementById('bmi-val').style.color=color;
  document.getElementById('bmi-cat').textContent=cat;
  const pct=Math.min(Math.max((bmi-15)/25,0),1)*100;
  document.getElementById('marker').style.left=pct+'%';
  document.getElementById('result').style.display='block';
}
</script>
</body></html>
